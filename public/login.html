<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartAttend+ | Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .login-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.1);
      width: 420px;
      overflow: hidden;
    }

    .login-header {
      background: #6D0000;
      padding: 40px 30px;
      text-align: center;
      color: white;
    }

    .login-header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .login-header p {
      font-size: 14px;
      margin-top: 8px;
      opacity: 0.85;
    }

    .login-body {
      padding: 40px 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      transition: border 0.3s;
      outline: none;
    }

    .form-group input:focus {
      border-color: #6D0000;
    }

    .login-btn {
      width: 100%;
      padding: 13px;
      background: #6D0000;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 10px;
    }

    .login-btn:hover {
      background: #4A0000;
    }

    .error-msg {
      color: #6D0000;
      font-size: 13px;
      margin-top: 10px;
      text-align: center;
      display: none;
    }

    .footer-text {
      text-align: center;
      font-size: 12px;
      color: #aaa;
      padding: 20px;
      border-top: 1px solid #f0f0f0;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-header">
      <h1>SmartAttend+</h1>
      <p>RFID Attendance Management System</p>
    </div>

    <div class="login-body">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" />
      </div>

      <button class="login-btn" onclick="login()">Login</button>
      <p class="error-msg" id="error">Invalid email or password!</p>
    </div>

    <div class="footer-text">
      National University of Technology — NUTECH
    </div>
  </div>

  <script>
    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('http://localhost:5000/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('name', data.name);
          window.location.href = 'dashboard.html';
        } else {
          document.getElementById('error').style.display = 'block';
        }
      } catch (err) {
        document.getElementById('error').style.display = 'block';
      }
    }
  </script>

</body>
</html>
